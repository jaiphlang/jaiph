<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jaiph run</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <header class="top">
      <p><a href="/">← Runs</a></p>
      <h1 id="run-title">Run</h1>
      <p class="muted" id="run-sub"></p>
    </header>

    <div class="run-layout">
      <aside class="tree-panel">
        <h2>Steps</h2>
        <div id="step-tree"></div>
      </aside>
      <main class="detail-panel">
        <div class="tabs">
          <button type="button" class="tab active" data-tab="response">Response</button>
          <button type="button" class="tab" data-tab="raw">Raw logs</button>
          <button type="button" class="tab" data-tab="aggregate">Aggregate</button>
        </div>
        <div id="panel-response" class="panel active">
          <pre id="out-response" class="code"></pre>
        </div>
        <div id="panel-raw" class="panel">
          <label>Stream
            <select id="raw-stream">
              <option value="out">stdout (.out)</option>
              <option value="err">stderr (.err)</option>
            </select>
          </label>
          <button type="button" id="raw-load">Load</button>
          <pre id="out-raw" class="code"></pre>
        </div>
        <div id="panel-aggregate" class="panel">
          <button type="button" id="agg-load">Load stitched output</button>
          <pre id="out-aggregate" class="code"></pre>
        </div>
      </main>
    </div>
    <script src="/assets/run.js"></script>
  </body>
</html>
