<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jaiph runs</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <header class="top">
      <h1>Jaiph runs</h1>
      <p class="muted">Read-only view of <code>.jaiph/runs</code> (refreshed automatically).</p>
    </header>

    <section class="active-strip" id="active-strip">
      <h2>Active</h2>
      <div id="active-list" class="active-list muted">None</div>
    </section>

    <section class="filters">
      <label>Date <input type="text" id="f-date" placeholder="YYYY-MM-DD" /></label>
      <label>Status
        <select id="f-status">
          <option value="">any</option>
          <option value="running">running</option>
          <option value="completed">completed</option>
          <option value="failed">failed</option>
        </select>
      </label>
      <label>Search <input type="search" id="f-q" placeholder="path, source, run id" /></label>
      <button type="button" id="f-apply">Apply</button>
    </section>

    <div class="table-wrap">
      <table class="runs-table" id="runs-table">
        <thead>
          <tr>
            <th data-sort="path">Path</th>
            <th data-sort="source">Source</th>
            <th data-sort="started_at">Started</th>
            <th data-sort="duration">Duration</th>
            <th data-sort="status">Status</th>
            <th data-sort="step_count">Steps</th>
          </tr>
        </thead>
        <tbody id="runs-body"></tbody>
      </table>
    </div>

    <p class="muted footer" id="runs-meta"></p>
    <script src="/assets/list.js"></script>
  </body>
</html>
