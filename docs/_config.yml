title: Jaiph — AI Workflow DSL
description: >-
  Jaiph — Open source AI workflow DSL. Powerful and friendly automation for
  AI-assisted development.

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: none

highlighter: none

plugins:
  - jekyll-relative-links
  - jekyll-redirect-from

relative_links:
  enabled: true
  collections: false

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "docs"

exclude:
  - vendor
  # Keep install-from-local.sh out of the site (developer-only).
  - install-from-local.sh
  - CNAME
