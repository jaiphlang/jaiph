name: CI

on:
  push:

jobs:
  test:
    name: Compiler and unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run core test suite (unit and acceptance)
        run: npm test

      - name: Verify public install URL (jaiph use default path)
        run: curl -fsSL -o /dev/null --retry 3 --retry-delay 1 https://jaiph.org/install

      - name: Verify git tag for package version exists (canonical repo)
        if: github.ref == 'refs/heads/main'
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          git ls-remote --exit-code https://github.com/jaiphlang/jaiph.git "refs/tags/v${VERSION}"

  e2e:
    name: E2E install and CLI workflow (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run runtime acceptance E2E
        run: |
          npm ci
          npm run test:e2e

  docs-local:
    name: Getting started (local)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: docs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Jaiph
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Serve Jekyll in background
        working-directory: docs
        run: |
          bundle exec jekyll serve --host 127.0.0.1 --port 4000 &
          JEKYLL_PID=$!
          echo "JEKYLL_PID=$JEKYLL_PID" >> "$GITHUB_ENV"

      - name: Wait for Jekyll to respond
        run: |
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null http://127.0.0.1:4000/; then
              echo "Jekyll is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Jekyll failed to start within 30s"
          exit 1

      - name: Smoke-check local site
        run: |
          curl -fsS -o /dev/null -w "HTTP %{http_code} for /\n" http://127.0.0.1:4000/
          curl -fsS -o /dev/null -w "HTTP %{http_code} for /getting-started\n" http://127.0.0.1:4000/getting-started

      - name: Verify landing-page samples
        run: |
          export PATH="${GITHUB_WORKSPACE}/node_modules/.bin:${PATH}"
          SITE_URL=http://127.0.0.1:4000 npx playwright test

  e2e-wsl:
    name: E2E install and CLI workflow (windows-latest + wsl)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect WSL distro
        id: detect_wsl
        shell: pwsh
        run: |
          $distros = @(wsl -l -q | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne "" })
          if ($distros.Count -eq 0) {
            "distro=" >> $env:GITHUB_OUTPUT
            Write-Warning "No WSL distro is available on this runner. Skipping WSL E2E."
            exit 0
          }
          $ubuntu = $distros | Where-Object { $_ -match "^Ubuntu" } | Select-Object -First 1
          $selected = if ($ubuntu) { $ubuntu } else { $distros[0] }
          "distro=$selected" >> $env:GITHUB_OUTPUT
          Write-Host "Using WSL distro: $selected"

      - name: Install Node and run E2E tests in WSL
        if: steps.detect_wsl.outputs.distro != ''
        shell: pwsh
        run: |
          $workspace = "${{ github.workspace }}"
          $distro = "${{ steps.detect_wsl.outputs.distro }}"
          wsl -d "$distro" -- bash -lc "set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates
          if ! command -v node >/dev/null 2>&1; then
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt-get install -y nodejs
          fi
          cd \"\$(wslpath '$workspace')\"
          npm ci
          npm run test:e2e
          "

      - name: WSL E2E skipped
        if: steps.detect_wsl.outputs.distro == ''
        shell: pwsh
        run: |
          Write-Host "No WSL distro found on this runner image; skipping WSL E2E."
