name: CI

on:
  push:

jobs:
  test:
    name: Compiler and unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run core test suite
        run: npm test

      - name: Run compiler acceptance tests
        run: npm run test:acceptance:compiler

      - name: Run fixture Jest tests
        run: npm run test:jest

  e2e:
    name: E2E install and CLI workflow (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run runtime acceptance E2E
        run: npm run test:acceptance:runtime
