name: Nightly Engineer Run

on:
  workflow_dispatch:
    inputs:
      engineer_type:
        description: "Engineer role (auto uses task classification)"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - surgical
          - reductionist
          - optimizer
          - stabilizer

permissions:
  contents: write
  pull-requests: write

jobs:
  run-engineer:
    runs-on: ubuntu-latest
    env:
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      CURSOR_TOKEN: ${{ secrets.CURSOR_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      JAIPH_PR_TOKEN: ${{ secrets.JAIPH_PR_TOKEN }}
    steps:
      - name: Checkout nightly
        uses: actions/checkout@v4
        with:
          ref: nightly
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Jaiph from local source
        shell: bash
        run: bash ./docs/install-from-local.sh

      - name: Install Cursor agent CLI
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://cursor.com/install -o /tmp/install-cursor-agent.sh
          bash /tmp/install-cursor-agent.sh
          if command -v cursor-agent >/dev/null 2>&1; then
            echo "cursor-agent installed at $(command -v cursor-agent)"
          elif command -v agent >/dev/null 2>&1; then
            sudo ln -sf "$(command -v agent)" /usr/local/bin/cursor-agent
            echo "Linked agent -> /usr/local/bin/cursor-agent"
          elif command -v cursor >/dev/null 2>&1; then
            sudo ln -sf "$(command -v cursor)" /usr/local/bin/cursor-agent
            echo "Linked cursor -> /usr/local/bin/cursor-agent"
          else
            echo "cursor-agent installation failed: no cursor-agent/agent/cursor binary found" >&2
            exit 1
          fi
          command -v cursor-agent

      - name: Backend command preflight
        shell: bash
        run: |
          set -euo pipefail
          if [ "${JAIPH_AGENT_BACKEND:-}" = "claude" ]; then
            command -v claude
          fi
          if [ "${JAIPH_AGENT_BACKEND:-}" = "cursor" ] || [ -z "${JAIPH_AGENT_BACKEND:-}" ]; then
            command -v cursor-agent
          fi

      - name: Run engineer
        shell: bash
        run: |
          set -euo pipefail

          engineer_type="${{ inputs.engineer_type }}"
          if [ "${engineer_type}" = "auto" ]; then
            ./.jaiph/engineer.jh
          else
            ./.jaiph/engineer.jh -- "${engineer_type}"
          fi

      - name: Create worktree patch artifact
        if: always()
        id: patch
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .jaiph/artifacts
          patch_file=".jaiph/artifacts/worktree-${GITHUB_RUN_ID}.patch"
          git add -N . || true
          git diff --binary > "${patch_file}" || true
          if [ ! -s "${patch_file}" ]; then
            echo "# No git diff produced by engineer run" > "${patch_file}"
          fi
          echo "patch_file=${patch_file}" >> "${GITHUB_OUTPUT}"

      - name: Upload Jaiph runs artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jaiph-runs-${{ github.run_id }}
          path: .jaiph/runs
          if-no-files-found: warn
          retention-days: 14

      - name: Upload git patch artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jaiph-worktree-patch-${{ github.run_id }}
          path: ${{ steps.patch.outputs.patch_file }}
          if-no-files-found: error
          retention-days: 14

      - name: Derive commit message and PR title
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          task_header="$(
            awk '/^## / { print; exit }' QUEUE.md \
              | sed -E 's/^##[[:space:]]+//' \
              | sed -E 's/[[:space:]]*<!--.*$//'
          )"

          if [ -z "${task_header}" ]; then
            task_header="Nightly engineer update"
          fi

          changelog_line="$(
            awk '
              BEGIN { in_nightly=0; in_changes=0 }
              /^# Nightly$/ { in_nightly=1; next }
              in_nightly && /^## All changes$/ { in_changes=1; next }
              in_changes && /^- / { print; exit }
            ' CHANGELOG.md
          )"

          commit_message="$(printf '%s' "${changelog_line}" | sed -E 's/^- //' | sed -E 's/^\*\*//' | sed -E 's/\*\*[[:space:]]*—.*$//')"
          if [ -z "${commit_message}" ]; then
            commit_message="chore: nightly engineer update"
          fi

          {
            echo "pr_title=${task_header}"
            echo "commit_message=${commit_message}"
          } >> "${GITHUB_OUTPUT}"

      - name: Push branch and create Pull Request (PAT)
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${JAIPH_PR_TOKEN:-}" ]; then
            echo "JAIPH_PR_TOKEN is required for PR creation." >&2
            exit 1
          fi

          export GH_TOKEN="${JAIPH_PR_TOKEN}"

          branch_name="automation/nightly-engineer-${GITHUB_RUN_ID}"
          git checkout -b "${branch_name}" nightly
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit. Skipping PR creation."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "${{ steps.metadata.outputs.commit_message }}"
          git push --set-upstream "https://x-access-token:${JAIPH_PR_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "${branch_name}"

          gh pr create --title "${{ steps.metadata.outputs.pr_title }}" --body "$(cat <<'EOF'
          Automated engineer run from workflow dispatch.

          - Base branch: `nightly`
          - Engineer type: `${{ inputs.engineer_type }}`
          EOF
          )" --head "${branch_name}" --base nightly
